name: ESP-IDF CI Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: espressif/idf:release-v5.2
      # Esto fuerza a que GitHub Actions use el entrypoint oficial de Espressif
      # el cual exporta automáticamente idf.py al PATH del sistema
      options: --entrypoint /opt/esp/entrypoint.sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Initialize and Build Project
        run: |
          idf.py set-target esp32
          idf.py build
